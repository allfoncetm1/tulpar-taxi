<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tulpar TAXI — Карта</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <style>
    /* Tulpar dark theme — matches handoff */
    :root {
      --bg: #0C0E08;
      --surface: #15180E;
      --fg: #F2F4E8;
      --fg2: #9A9D8C;
      --fg3: #62655A;
      --line: #272B1B;
      --lime: #DCFB3D;
      --on-lime: #16170C;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--bg); font-family: 'Manrope', -apple-system, sans-serif; overflow: hidden; color: var(--fg); }
    #map { position: absolute; inset: 0; }

    /* Центральный пин */
    #center-pin {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -100%);
      pointer-events: none;
      z-index: 10;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.6));
    }

    /* Кнопка геолокации */
    #btn-locate {
      position: absolute;
      top: 16px; right: 16px;
      width: 44px; height: 44px;
      background: var(--surface);
      border: none; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 20;
      box-shadow: 0 6px 18px rgba(0,0,0,0.5);
    }
    #btn-locate:active { opacity: 0.75; }

    /* Панель адреса */
    #address-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 30px 30px 0 0;
      padding: 12px 22px 30px;
      z-index: 20;
      box-shadow: 0 -14px 44px rgba(0,0,0,0.45);
    }
    .handle {
      width: 42px; height: 5px;
      background: var(--line); border-radius: 4px;
      margin: 0 auto 16px;
    }
    .mode-label {
      color: var(--fg3); font-size: 11px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 6px;
    }
    .address-text {
      color: var(--fg); font-size: 16px; font-weight: 700;
      min-height: 22px; margin-bottom: 18px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: -0.2px;
    }
    .address-text.loading { color: var(--fg3); font-weight: 600; }
    .btn-confirm {
      width: 100%; background: var(--lime); color: var(--on-lime);
      border: none; border-radius: 18px; height: 60px;
      font-size: 17px; font-weight: 800; cursor: pointer;
      letter-spacing: -0.2px;
      box-shadow: 0 14px 30px -8px rgba(160,200,0,0.5);
      transition: transform 0.1s;
    }
    .btn-confirm:active { transform: scale(0.985); }

    /* Точка "я здесь" */
    .my-dot {
      width: 18px; height: 18px;
      background: var(--lime); border: 3px solid var(--surface);
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(220,251,61,0.2);
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Центральный лайм-пин -->
<div id="center-pin">
  <svg width="36" height="50" viewBox="0 0 36 50" fill="none">
    <path d="M18 0C8.059 0 0 8.059 0 18c0 12 18 32 18 32S36 30 36 18C36 8.059 27.941 0 18 0z" fill="#CCFF00"/>
    <circle cx="18" cy="18" r="7" fill="#0D0D0D"/>
  </svg>
</div>

<!-- Кнопка геолокации -->
<button id="btn-locate">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="4" fill="#CCFF00"/>
    <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="#CCFF00" stroke-width="2" stroke-linecap="round"/>
    <circle cx="12" cy="12" r="9" stroke="#CCFF00" stroke-width="1.5" opacity="0.35"/>
  </svg>
</button>

<!-- Панель адреса -->
<div id="address-bar">
  <div class="handle"></div>
  <div class="mode-label" id="mode-label">ОТКУДА</div>
  <div class="address-text loading" id="address-text">Определяем адрес...</div>
  <button class="btn-confirm" id="btn-confirm">Подтвердить</button>
</div>

<script>
  const CITY_LAT = 49.465040;
  const CITY_LNG = 57.410118;

  const params = new URLSearchParams(location.search);
  const mode   = params.get('mode') || 'from';
  const urlLat = parseFloat(params.get('lat') || '');
  const urlLng = parseFloat(params.get('lng') || '');
  const hasPos = !isNaN(urlLat) && !isNaN(urlLng);
  const initLat = hasPos ? urlLat : CITY_LAT;
  const initLng = hasPos ? urlLng : CITY_LNG;

  let selectedLat = initLat;
  let selectedLng = initLng;
  let geocodeTimer = null;
  let myDotMarker = null;
  let map = null;

  document.getElementById('mode-label').textContent = mode === 'from' ? 'ОТКУДА' : 'КУДА';

  // Загружаем токен и инициализируем карту
  fetch('/config').then(r => r.json()).then(({ mapboxToken }) => {
    mapboxgl.accessToken = mapboxToken;

    map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/streets-v12',
      center: [initLng, initLat],
      zoom: hasPos ? 16 : 14,
      attributionControl: false,
    });

    map.on('load', () => {
      reverseGeocode(initLat, initLng);
    });

    // Когда карта двигается — обновляем центр и адрес
    map.on('moveend', () => {
      const c = map.getCenter();
      selectedLat = c.lat;
      selectedLng = c.lng;
      reverseGeocode(c.lat, c.lng);
    });
  });

  function reverseGeocode(lat, lng) {
    const el = document.getElementById('address-text');
    el.textContent = 'Определяем адрес...';
    el.classList.add('loading');
    clearTimeout(geocodeTimer);
    geocodeTimer = setTimeout(async () => {
      try {
        const resp = await fetch(`/geocode?lat=${lat}&lng=${lng}`);
        const data = await resp.json();
        const name = data.hits?.[0]?.name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        el.textContent = name;
        el.classList.remove('loading');
      } catch {
        el.textContent = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        el.classList.remove('loading');
      }
    }, 400);
  }

  // Показать синюю точку "я здесь"
  function showMyDot(lat, lng) {
    if (!map) return;
    if (myDotMarker) {
      myDotMarker.setLngLat([lng, lat]);
    } else {
      const el = document.createElement('div');
      el.className = 'my-dot';
      myDotMarker = new mapboxgl.Marker({ element: el }).setLngLat([lng, lat]).addTo(map);
    }
  }

  // applyLocation — вызывается из Android нативно
  function applyLocation(lat, lng, moveCamera) {
    showMyDot(lat, lng);
    if (moveCamera && map) {
      map.flyTo({ center: [lng, lat], zoom: 16, speed: 1.5 });
    }
  }

  // Кнопка геолокации
  document.getElementById('btn-locate').addEventListener('click', () => {
    if (window.TulparBridge?.requestLocation) {
      window.TulparBridge.requestLocation();
    } else if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        p => applyLocation(p.coords.latitude, p.coords.longitude, true),
        null,
        { enableHighAccuracy: false, timeout: 8000 }
      );
    }
  });

  // Кнопка подтвердить
  document.getElementById('btn-confirm').addEventListener('click', () => {
    const address = document.getElementById('address-text').textContent;
    if (window.TulparBridge) {
      window.TulparBridge.onPointSelected(mode, selectedLat, selectedLng, address);
    } else {
      console.log('Point selected:', mode, selectedLat, selectedLng, address);
    }
  });

  // Браузерный fallback геолокации
  if (!window.TulparBridge && !hasPos && navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      p => applyLocation(p.coords.latitude, p.coords.longitude, true),
      null,
      { enableHighAccuracy: false, timeout: 8000 }
    );
  }
</script>
</body>
</html>
