version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tulpar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tulpar_taxi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - tulpar_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tulpar_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  tulpar_pg_data:
